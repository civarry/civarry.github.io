name: Update Repo Health

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC, after contributions and repo graph
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Audit repos against the documentation standard
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          MANAGE_ISSUES: "1"
        run: python .github/scripts/audit_repos.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo_health.json
          git diff --cached --quiet || (git commit -m "chore: update repo health" && git pull --rebase && git push)
