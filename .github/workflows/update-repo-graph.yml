name: Update Repo Graph

on:
  schedule:
    - cron: '30 1 * * *' # Daily at 1:30 AM UTC, after the contributions update
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet sentence-transformers numpy

      - name: Build repo graph with MiniLM embeddings
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python .github/scripts/build_repo_graph.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo_graph.json
          git diff --cached --quiet || (git commit -m "chore: update repo graph" && git push)
